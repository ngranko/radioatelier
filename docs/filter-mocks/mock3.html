<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <title>Макет 3 · Панель-шторка</title>
        <link rel="stylesheet" href="shared.css" />
        <style>
            /* Mock 3 — side drawer (desktop) / bottom sheet (phone) with accordions. */
            .f3-trigger {
                position: absolute;
                top: 56px;
                left: 8px;
                height: 40px;
                padding: 0 14px;
                border-radius: 999px;
                border: none;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--foreground);
                background: rgba(255, 255, 255, 0.85);
            }
            .dark .f3-trigger {
                background: rgba(255, 255, 255, 0.1);
            }
            .f3-trigger svg {
                width: 16px;
                height: 16px;
                color: var(--muted-foreground);
            }
            .f3-trigger.on,
            .f3-trigger.on svg {
                color: var(--primary);
            }

            .f3-scrim {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.28);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s;
            }
            .f3.open .f3-scrim {
                opacity: 1;
                pointer-events: auto;
            }

            .f3-drawer {
                position: absolute;
                top: 8px;
                right: 8px;
                bottom: 8px;
                width: 360px;
                max-width: calc(100% - 16px);
                border-radius: 22px;
                display: flex;
                flex-direction: column;
                transform: translateX(calc(100% + 16px));
                transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
                overflow: hidden;
            }
            .f3.open .f3-drawer {
                transform: none;
            }
            body.phone .f3-drawer {
                top: auto;
                right: 0;
                left: 0;
                bottom: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 24px 24px 0 0;
                height: 80%;
                transform: translateY(calc(100% + 16px));
            }
            body.phone .f3.open .f3-drawer {
                transform: none;
            }

            .f3-grab {
                display: none;
                width: 40px;
                height: 4px;
                border-radius: 999px;
                background: var(--border);
                margin: 8px auto 0;
            }
            body.phone .f3-grab {
                display: block;
            }
            .f3-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 18px 10px;
            }
            .f3-title {
                font-size: 16px;
                font-weight: 700;
            }
            .f3-title small {
                display: block;
                font-size: 12px;
                font-weight: 500;
                color: var(--muted-foreground);
                margin-top: 2px;
            }
            .f3-title b {
                color: var(--primary);
            }
            .f3-x {
                width: 32px;
                height: 32px;
                border-radius: 999px;
                border: none;
                background: color-mix(in srgb, var(--muted) 60%, transparent);
                color: var(--muted-foreground);
                display: grid;
                place-items: center;
            }
            .f3-x svg {
                width: 15px;
                height: 15px;
            }

            .f3-body {
                flex: 1;
                overflow-y: auto;
                padding: 0 8px;
            }
            .acc {
                border-bottom: 1px solid var(--border);
            }
            .acc-head {
                width: 100%;
                background: transparent;
                border: none;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 10px;
                color: var(--foreground);
                font-size: 14px;
                font-weight: 600;
            }
            .acc-head .ico {
                width: 16px;
                height: 16px;
                color: var(--muted-foreground);
                display: grid;
                place-items: center;
            }
            .acc-head .ico svg {
                width: 16px;
                height: 16px;
            }
            .acc-head .pill {
                margin-left: auto;
                font-size: 11px;
                font-weight: 700;
                min-width: 20px;
                height: 20px;
                padding: 0 6px;
                border-radius: 999px;
                background: var(--primary);
                color: var(--primary-foreground);
                display: none;
                place-items: center;
            }
            .acc.has .acc-head .pill {
                display: grid;
            }
            .acc-head .chev {
                color: var(--muted-foreground);
                transition: transform 0.2s;
            }
            .acc-head .chev svg {
                width: 16px;
                height: 16px;
            }
            .acc.open .acc-head .chev {
                transform: rotate(180deg);
            }
            .acc-body {
                display: none;
                padding: 2px 10px 14px;
            }
            .acc.open .acc-body {
                display: block;
            }

            .row {
                width: 100%;
                background: transparent;
                border: none;
                display: flex;
                align-items: center;
                gap: 11px;
                padding: 9px 6px;
                border-radius: 10px;
                color: var(--foreground);
                font-size: 13.5px;
            }
            .row:hover {
                background: color-mix(in srgb, var(--muted) 50%, transparent);
            }
            .row .dot {
                width: 12px;
                height: 12px;
            }
            .row .nm {
                text-align: left;
            }
            .row .n {
                margin-left: auto;
                font-size: 12px;
                color: var(--muted-foreground);
            }
            .box {
                width: 19px;
                height: 19px;
                border-radius: 6px;
                border: 1.8px solid var(--border);
                display: grid;
                place-items: center;
                color: transparent;
                flex: none;
            }
            .box svg {
                width: 12px;
                height: 12px;
            }
            .row.sel .box {
                background: var(--primary);
                border-color: var(--primary);
                color: var(--primary-foreground);
            }

            .f3-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 7px;
                padding: 4px 4px 0;
            }
            .chip {
                height: 32px;
                padding: 0 12px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--card);
                color: var(--foreground);
                font-size: 13px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .chip svg {
                width: 13px;
                height: 13px;
                color: var(--muted-foreground);
            }
            .chip.sel {
                border-color: transparent;
                background: color-mix(in srgb, var(--primary) 12%, var(--card));
                color: var(--primary);
                box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--primary) 35%, transparent);
            }
            .chip.sel svg {
                color: var(--primary);
            }

            .f3-foot {
                display: flex;
                gap: 10px;
                padding: 12px 16px;
                border-top: 1px solid var(--border);
            }
            .f3-foot button {
                height: 42px;
                border-radius: 12px;
                border: none;
                font-size: 14px;
                font-weight: 600;
            }
            .f3-reset {
                flex: 0 0 auto;
                padding: 0 18px;
                background: transparent;
                color: var(--muted-foreground);
            }
            .f3-apply {
                flex: 1;
                background: var(--primary);
                color: var(--primary-foreground);
            }
        </style>
    </head>
    <body>
        <script src="shared.js"></script>
        <script>
            const layer = buildScaffold({title: 'Макет 3 · Панель-шторка'});
            const sel = {cat: new Set(), tag: new Set(), priv: new Set()};
            const accOpen = {cat: true, tag: false, priv: false};

            const root = document.createElement('div');
            root.className = 'f3';
            layer.appendChild(root);

            const total = () => sel.cat.size + sel.tag.size + sel.priv.size;
            const resultCount = () => {
                if (!total()) return TOTAL;
                let base = sel.cat.size
                    ? CATEGORIES.filter(c => sel.cat.has(c.id)).reduce((s, c) => s + c.n, 0)
                    : TOTAL;
                return Math.max(1, Math.round(base * (1 - Math.min(0.6, (sel.tag.size + sel.priv.size) * 0.15))));
            };

            function catRows() {
                return CATEGORIES.map(
                    c => `<button class="row ${sel.cat.has(c.id) ? 'sel' : ''}" data-pick="cat:${c.id}">
                        <span class="dot" style="--c:${c.c}"></span>
                        <span class="nm">${c.name}</span><span class="n">${c.n}</span>
                        <span class="box">${ICON.check}</span></button>`,
                ).join('');
            }
            function chipWrap(kind, items, icon) {
                return `<div class="f3-chips">${items
                    .map(
                        t => `<button class="chip ${sel[kind].has(t) ? 'sel' : ''}" data-pick="${kind}:${t}">${icon}${t}</button>`,
                    )
                    .join('')}</div>`;
            }
            function acc(key, icon, label, inner) {
                return `<div class="acc ${accOpen[key] ? 'open' : ''} ${sel[key].size ? 'has' : ''}">
                    <button class="acc-head" data-acc="${key}">
                        <span class="ico">${icon}</span>${label}
                        <span class="pill">${sel[key].size}</span>
                        <span class="chev">${ICON.chevron}</span>
                    </button>
                    <div class="acc-body">${inner}</div></div>`;
            }

            function render() {
                const t = total();
                root.innerHTML = `
                    <button class="f3-trigger glass ${t ? 'on' : ''}" data-x="toggle">
                        ${ICON.sliders}<span>Фильтр</span>${t ? `<span class="count-badge">${t}</span>` : ''}
                    </button>
                    <div class="f3-scrim" data-x="toggle"></div>
                    <div class="f3-drawer glass">
                        <div class="f3-grab"></div>
                        <div class="f3-top">
                            <div class="f3-title">Фильтр<small>Показано <b>${resultCount()}</b> из ${TOTAL} объектов</small></div>
                            <button class="f3-x" data-x="toggle">${ICON.x}</button>
                        </div>
                        <div class="f3-body">
                            ${acc('cat', ICON.map, 'Категории', catRows())}
                            ${acc('tag', ICON.tag, 'Теги', chipWrap('tag', TAGS, ICON.tag))}
                            ${acc('priv', ICON.lock, 'Личные теги', chipWrap('priv', PRIVATE_TAGS, ICON.lock))}
                        </div>
                        <div class="f3-foot">
                            <button class="f3-reset" data-x="clear">Сбросить</button>
                            <button class="f3-apply" data-x="toggle">Показать${t ? ` (${resultCount()})` : ''}</button>
                        </div>
                    </div>`;
                applyPinFilter(sel.cat);
            }

            root.addEventListener('click', e => {
                const trg = e.target.closest('[data-x],[data-acc],[data-pick]');
                if (!trg) return;
                if (trg.dataset.x === 'toggle') root.classList.toggle('open');
                else if (trg.dataset.x === 'clear') {
                    sel.cat.clear();
                    sel.tag.clear();
                    sel.priv.clear();
                    render();
                } else if (trg.dataset.acc) {
                    accOpen[trg.dataset.acc] = !accOpen[trg.dataset.acc];
                    render();
                } else if (trg.dataset.pick) {
                    const [k, v] = trg.dataset.pick.split(/:(.*)/);
                    sel[k].has(v) ? sel[k].delete(v) : sel[k].add(v);
                    render();
                }
            });

            render();
        </script>
    </body>
</html>
