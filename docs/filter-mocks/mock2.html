<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <title>Макет 2 · Фасетный поповер</title>
        <link rel="stylesheet" href="shared.css" />
        <style>
            /* Mock 2 — icon trigger + anchored glass popover with grouped facets. */
            .f2-trigger {
                position: absolute;
                top: 56px;
                left: 8px;
                height: 40px;
                padding: 0 14px;
                border-radius: 999px;
                border: none;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 600;
                color: var(--foreground);
                background: rgba(255, 255, 255, 0.85);
            }
            .dark .f2-trigger {
                background: rgba(255, 255, 255, 0.1);
            }
            .f2-trigger svg {
                width: 16px;
                height: 16px;
                color: var(--muted-foreground);
            }
            .f2-trigger.on,
            .f2-trigger.on svg {
                color: var(--primary);
            }

            .f2-pop {
                position: absolute;
                top: 104px;
                left: 8px;
                width: 340px;
                max-width: calc(100% - 16px);
                border-radius: 20px;
                overflow: hidden;
                display: none;
                flex-direction: column;
                max-height: min(640px, calc(100% - 120px));
            }
            .f2.open .f2-pop {
                display: flex;
                animation: pop2 0.18s ease;
            }
            @keyframes pop2 {
                from {
                    opacity: 0;
                    transform: translateY(-8px) scale(0.98);
                }
            }
            .f2-head {
                padding: 12px 14px 8px;
            }
            .f2-count {
                font-size: 13px;
                font-weight: 600;
            }
            .f2-count b {
                color: var(--primary);
            }
            .f2-search {
                margin-top: 10px;
                position: relative;
            }
            .f2-search input {
                width: 100%;
                height: 36px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: color-mix(in srgb, var(--muted) 50%, transparent);
                padding: 0 12px 0 32px;
                font-size: 13px;
                color: var(--foreground);
                outline: none;
            }
            .f2-search svg {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 14px;
                height: 14px;
                color: var(--muted-foreground);
            }
            .f2-body {
                overflow-y: auto;
                padding: 4px 14px 12px;
            }
            .f2-group {
                margin-top: 12px;
            }
            .f2-glabel {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--muted-foreground);
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 9px;
            }
            .f2-glabel svg {
                width: 12px;
                height: 12px;
            }
            .f2-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 7px;
            }
            .chip {
                height: 30px;
                padding: 0 11px;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--card);
                color: var(--foreground);
                font-size: 12.5px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .chip .dot {
                width: 8px;
                height: 8px;
            }
            .chip .n {
                font-size: 11px;
                color: var(--muted-foreground);
            }
            .chip.sel {
                border-color: transparent;
                background: color-mix(in srgb, var(--primary) 12%, var(--card));
                color: var(--primary);
                box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--primary) 35%, transparent);
            }
            .chip.sel .n {
                color: color-mix(in srgb, var(--primary) 70%, var(--foreground));
            }
            .chip.priv.sel {
                background: color-mix(in srgb, var(--muted-foreground) 14%, var(--card));
                color: var(--foreground);
                box-shadow: inset 0 0 0 1.5px var(--border);
            }
            .f2-foot {
                display: flex;
                gap: 8px;
                padding: 10px 14px;
                border-top: 1px solid var(--border);
            }
            .f2-foot button {
                flex: 1;
                height: 38px;
                border-radius: 10px;
                border: none;
                font-size: 13px;
                font-weight: 600;
            }
            .f2-reset {
                background: transparent;
                color: var(--muted-foreground);
            }
            .f2-done {
                background: var(--primary);
                color: var(--primary-foreground);
            }

            /* dim backdrop only matters on phone, where popover is large */
            .f2-scrim {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.25);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s;
            }
            body.phone .f2.open .f2-scrim {
                opacity: 1;
                pointer-events: auto;
            }
            body.phone .f2-pop {
                left: 50%;
                top: auto;
                bottom: 0;
                transform: translateX(-50%);
                width: 100%;
                max-width: 100%;
                border-radius: 24px 24px 0 0;
                max-height: 78%;
            }
        </style>
    </head>
    <body>
        <script src="shared.js"></script>
        <script>
            const layer = buildScaffold({title: 'Макет 2 · Фасетный поповер'});
            const sel = {cat: new Set(), tag: new Set(), priv: new Set()};

            const root = document.createElement('div');
            root.className = 'f2';
            layer.appendChild(root);

            const total = () => sel.cat.size + sel.tag.size + sel.priv.size;

            function chip(kind, id, label, extra) {
                const set = sel[kind];
                return `<button class="chip ${kind === 'priv' ? 'priv' : ''} ${
                    set.has(id) ? 'sel' : ''
                }" data-pick="${kind}:${id}">${extra || ''}${label}</button>`;
            }

            function resultCount() {
                // playful: shrink the visible count as filters narrow
                if (!total()) return TOTAL;
                let base = 0;
                if (sel.cat.size) CATEGORIES.forEach(c => sel.cat.has(c.id) && (base += c.n));
                else base = TOTAL;
                const factor = 1 - Math.min(0.6, (sel.tag.size + sel.priv.size) * 0.15);
                return Math.max(1, Math.round(base * factor));
            }

            function render() {
                const t = total();
                root.innerHTML = `
                    <button class="f2-trigger glass ${t ? 'on' : ''}" data-x="toggle">
                        ${ICON.sliders}<span>Фильтр</span>${t ? `<span class="count-badge">${t}</span>` : ''}
                    </button>
                    <div class="f2-scrim" data-x="toggle"></div>
                    <div class="f2-pop glass">
                        <div class="f2-head">
                            <div class="f2-count">Показано <b>${resultCount()}</b> из ${TOTAL}</div>
                            <div class="f2-search">${ICON.search}<input placeholder="Найти категорию или тег" /></div>
                        </div>
                        <div class="f2-body">
                            <div class="f2-group">
                                <div class="f2-glabel">${ICON.map} Категории</div>
                                <div class="f2-chips">${CATEGORIES.map(c =>
                                    chip('cat', c.id, `${c.name}<span class="n">${c.n}</span>`, `<span class="dot" style="--c:${c.c}"></span>`),
                                ).join('')}</div>
                            </div>
                            <div class="f2-group">
                                <div class="f2-glabel">${ICON.tag} Теги</div>
                                <div class="f2-chips">${TAGS.map(t => chip('tag', t, t)).join('')}</div>
                            </div>
                            <div class="f2-group">
                                <div class="f2-glabel">${ICON.lock} Личные теги</div>
                                <div class="f2-chips">${PRIVATE_TAGS.map(t => chip('priv', t, t, ICON.lock)).join('')}</div>
                            </div>
                        </div>
                        <div class="f2-foot">
                            <button class="f2-reset" data-x="clear">Сбросить${t ? ` · ${t}` : ''}</button>
                            <button class="f2-done" data-x="toggle">Готово</button>
                        </div>
                    </div>`;
                applyPinFilter(sel.cat);
            }

            root.addEventListener('click', e => {
                const trg = e.target.closest('[data-x],[data-pick]');
                if (!trg) return;
                if (trg.dataset.x === 'toggle') root.classList.toggle('open');
                else if (trg.dataset.x === 'clear') {
                    sel.cat.clear();
                    sel.tag.clear();
                    sel.priv.clear();
                    render();
                } else if (trg.dataset.pick) {
                    const [k, v] = trg.dataset.pick.split(/:(.*)/);
                    sel[k].has(v) ? sel[k].delete(v) : sel[k].add(v);
                    render();
                }
            });

            render();
        </script>
    </body>
</html>
